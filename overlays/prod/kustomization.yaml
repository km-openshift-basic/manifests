apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

labels:
  - pairs:
      env: prod
    includeSelectors: true

patches:
  - path: patch-config.yaml
  - path: patch-app-db-url.yaml
  - path: patch-route.yaml

replicas:
  - name: app
    count: 2

images:
  - name: workshop-app
    newName: image-registry.openshift-image-registry.svc:5000/<user>-devspaces/workshop-app # Project名は各自で設定してください
    newTag: promoted
