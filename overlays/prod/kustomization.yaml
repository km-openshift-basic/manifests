apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-config.yaml

replicas:
  - name: app
    count: 2

images:
  - name: workshop-app
    newName: image-registry.openshift-image-registry.svc:5000/NAMESPACE/workshop-app
    newTag: promoted
