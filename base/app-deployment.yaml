apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: workshop-app
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-app
      component: app
  template:
    metadata:
      labels:
        app: workshop-app
        component: app
    spec:
      containers:
        - name: app
          image: workshop-app:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: database-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: database-password
            - name: DB_URL
              value: jdbc:postgresql://db:5432/workshop
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
